<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Analítica Histórica — Gestiona Trades</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0d0f1a;color:#c9cde0;font-family:'Consolas','Fira Code',monospace;font-size:13px;padding-bottom:30px}
  .topbar{background:#141726;border-bottom:1px solid #232740;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
  .topbar h1{font-size:15px;color:#e0e3f0;letter-spacing:1px}
  .main{padding:16px;display:flex;flex-direction:column;gap:16px}

  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));gap:12px}
  .kpi-card{background:#141726;border:1px solid #232740;border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:4px}
  .kpi-label{font-size:10px;color:#6b7294;text-transform:uppercase;letter-spacing:0.5px}
  .kpi-val{font-size:18px;font-weight:bold;color:#e0e3f0}
  .pos{color:#2dc653} .neg{color:#e63946}

  .chart-grid{display:grid;grid-template-columns:1fr;gap:16px}
  .chart-row-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .chart-container{background:#141726;border:1px solid #232740;border-radius:8px;padding:12px;position:relative;height:350px}
  @media(max-width:900px){.chart-row-2{grid-template-columns:1fr}}

  .badge{padding:3px 8px;border-radius:4px;background:#252850;color:#e0e3f0;text-decoration:none;font-size:11px}

  /* Controles de Filtro */
  .filter-bar{background:#141726; border:1px solid #232740; padding:10px 16px; border-radius:8px; display:flex; gap:15px; align-items:center; flex-wrap:wrap;}
  .filter-bar input{background:#0d0f1a; color:#c9cde0; border:1px solid #3a3d52; padding:5px 8px; border-radius:4px; font-family:inherit; color-scheme: dark;}
  .btn{background:#252850; border:1px solid #3a3d52; color:#c9cde0; padding:5px 12px; border-radius:4px; cursor:pointer; font-family:inherit; transition:0.2s;}
  .btn:hover{background:#3a3d52}

  /* Botones Toggle Gráfico Principal */
  .toggle-bar{display:flex; gap:10px; margin-bottom:10px;}
  .toggle-btn{background:#1a1d2e; border:1px solid #2dc653; color:#2dc653; padding:4px 10px; border-radius:15px; cursor:pointer; font-size:11px; font-weight:bold;}
  .toggle-btn.off{border-color:#4a4e6a; color:#4a4e6a; background:#141726;}
  .toggle-btn.dd{border-color:#e63946; color:#e63946;}
  .toggle-btn.dd.off{border-color:#4a4e6a; color:#4a4e6a;}
  .toggle-btn.op{border-color:#f4a261; color:#f4a261;}
  .toggle-btn.op.off{border-color:#4a4e6a; color:#4a4e6a;}
</style>
</head>
<body>

<div class="topbar">
  <h1>📊 Analítica Histórica (Backtest Real)</h1>
  <a href="/" class="badge">← Volver al Live Dashboard</a>
</div>

<div class="main">
  <div class="filter-bar">
    <div style="font-weight:bold; color:#8b8fa8; font-size:11px; text-transform:uppercase;">Filtro de Rango:</div>
    <label style="font-size:12px;">Desde: <input type="date" id="startDate"></label>
    <label style="font-size:12px;">Hasta: <input type="date" id="endDate"></label>
    <button class="btn" onclick="applyFilters()">Aplicar Filtro</button>
    <button class="btn" onclick="resetFilters()">Reset Global</button>
  </div>

  <div class="kpi-grid">
    <div class="kpi-card"><span class="kpi-label">Net Profit</span><span class="kpi-val" id="kpi-pnl">—</span></div>
    <div class="kpi-card"><span class="kpi-label">Max Drawdown</span><span class="kpi-val neg" id="kpi-dd">—</span></div>
    <div class="kpi-card"><span class="kpi-label">Total Trades</span><span class="kpi-val" id="kpi-trades">—</span></div>
    <div class="kpi-card"><span class="kpi-label">Win Rate</span><span class="kpi-val" id="kpi-wr">—</span></div>
    <div class="kpi-card"><span class="kpi-label">Profit Factor</span><span class="kpi-val" id="kpi-pf">—</span></div>
    <div class="kpi-card"><span class="kpi-label">Avg Trade</span><span class="kpi-val" id="kpi-avg">—</span></div>
  </div>

  <div class="chart-grid">
    <div class="chart-container" style="height: 420px; padding-top:40px;">
      <div class="toggle-bar" style="position:absolute; top:12px; left:12px; z-index:10;">
        <button id="btn-rend" class="toggle-btn" onclick="toggleDataset(0, 'btn-rend')">Curva Rendimiento (ON)</button>
        <button id="btn-dd" class="toggle-btn dd" onclick="toggleDataset(1, 'btn-dd')">Drawdown (ON)</button>
        <button id="btn-op" class="toggle-btn op" onclick="toggleDataset(2, 'btn-op')">Trades Abiertos (ON)</button>
      </div>
      <canvas id="equityChart"></canvas>
    </div>
  </div>

  <div class="chart-row-2">
    <div class="chart-container"><canvas id="quintileChart"></canvas></div>
    <div class="chart-container"><canvas id="momentumChart"></canvas></div>
  </div>

  <div class="chart-grid">
    <div class="chart-container"><canvas id="categoryChart"></canvas></div>
    <div class="chart-container"><canvas id="pairChart"></canvas></div>
  </div>
</div>

<script>
Chart.defaults.color = '#8b8fa8';
Chart.defaults.borderColor = '#232740';

let allTrades = [];
let chartInstances = {};

function pnlClass(v) { return v >= 0 ? 'pos' : 'neg'; }

async function init() {
  try {
    const res = await fetch('/api/history_data');
    allTrades = await res.json();
    if (!allTrades.length) return;

    processData(allTrades);
  } catch (e) { console.error("Error loading history", e); }
}

function applyFilters() {
  const start = document.getElementById('startDate').value;
  const end = document.getElementById('endDate').value;

  let filtered = allTrades;

  if (start) {
    const startTs = new Date(start).getTime();
    filtered = filtered.filter(t => new Date(t.exit_fill_ts).getTime() >= startTs);
  }

  if (end) {
    // Se añade un día en milisegundos para incluir todo el día de cierre
    const endTs = new Date(end).getTime() + 86400000;
    filtered = filtered.filter(t => new Date(t.exit_fill_ts).getTime() <= endTs);
  }

  processData(filtered);
}

function resetFilters() {
  document.getElementById('startDate').value = '';
  document.getElementById('endDate').value = '';
  processData(allTrades);
}

// Lógica de apagado/encendido de líneas
function toggleDataset(index, btnId) {
  const chart = chartInstances['equityChart'];
  if (!chart) return;

  const meta = chart.getDatasetMeta(index);
  meta.hidden = meta.hidden === null ? !chart.data.datasets[index].hidden : null;
  chart.update();

  const btn = document.getElementById(btnId);
  if (meta.hidden) {
    btn.classList.add('off');
    btn.innerText = btn.innerText.replace('(ON)', '(OFF)');
  } else {
    btn.classList.remove('off');
    btn.innerText = btn.innerText.replace('(OFF)', '(ON)');
  }
}

function processData(trades) {
  // Limpiar lienzos anteriores al recargar filtros
  Object.values(chartInstances).forEach(chart => chart.destroy());
  chartInstances = {};

  // Matemáticas Globales
  let cumPnl = 0;
  let peak = 0;
  let maxDd = 0;
  let wins = 0;
  let grossProfit = 0;
  let grossLoss = 0;

  const labels = [];
  const equityData = [];
  const ddData = [];
  const openTradesData = [];

  const byQuintile = {};
  const byPair = {};
  const byCategory = {};

  // Rangos granulares solicitados
  const byMomentum = { '0-2%':0, '2-3%':0, '3-4%':0, '4-5%':0, '5-10%':0, '10-15%':0, '>15%':0 };

  // Calculadora de concurrencia temporal
  const getOpenTradesAt = (timestampStr) => {
    const currentTs = new Date(timestampStr).getTime();
    let count = 0;
    for (let i = 0; i < trades.length; i++) {
      const t = trades[i];
      const entryTs = new Date(t.entry_fill_ts || t.created_at).getTime();
      const exitTs = new Date(t.exit_fill_ts).getTime();
      if (entryTs <= currentTs && currentTs <= exitTs) {
        count++;
      }
    }
    return count;
  };

  trades.forEach((t, i) => {
    const pnl = t.pnl_usdt || 0;
    cumPnl += pnl;

    if (pnl > 0) { wins++; grossProfit += pnl; }
    else { grossLoss += Math.abs(pnl); }

    if (cumPnl > peak) peak = cumPnl;
    const currentDd = cumPnl - peak;
    if (currentDd < maxDd) maxDd = currentDd;

    // Arrays para gráfico principal
    labels.push(t.exit_fill_ts ? t.exit_fill_ts.substring(5,16).replace('T', ' ') : `T#${i}`);
    equityData.push(cumPnl);
    ddData.push(currentDd);
    openTradesData.push(t.exit_fill_ts ? getOpenTradesAt(t.exit_fill_ts) : 0);

    // Agrupación: Quintil
    const q = t.signal_data?.quintil || 'N/A';
    byQuintile[`Q${q}`] = (byQuintile[`Q${q}`] || 0) + pnl;

    // Agrupación: Categoría (campo real: "categoria")
    const cat = t.signal_data?.categoria || 'Otros';
    byCategory[cat] = (byCategory[cat] || 0) + pnl;

    // Agrupación: Par
    byPair[t.pair] = (byPair[t.pair] || 0) + pnl;

    // Agrupación: Momentum 1h
    const mom = t.signal_data?.mom_1h_pct || 0;
    if (mom > 15) byMomentum['>15%'] += pnl;
    else if (mom > 10) byMomentum['10-15%'] += pnl;
    else if (mom > 5) byMomentum['5-10%'] += pnl;
    else if (mom > 4) byMomentum['4-5%'] += pnl;
    else if (mom > 3) byMomentum['3-4%'] += pnl;
    else if (mom > 2) byMomentum['2-3%'] += pnl;
    else byMomentum['0-2%'] += pnl;
  });

  const pf = grossLoss > 0 ? (grossProfit / grossLoss) : grossProfit;
  const wr = trades.length > 0 ? (wins / trades.length) * 100 : 0;
  const avg = trades.length > 0 ? cumPnl / trades.length : 0;

  // Renderizar KPIs
  document.getElementById('kpi-pnl').textContent = cumPnl.toFixed(2) + ' USDT';
  document.getElementById('kpi-pnl').className = 'kpi-val ' + pnlClass(cumPnl);
  document.getElementById('kpi-dd').textContent = maxDd.toFixed(2) + ' USDT';
  document.getElementById('kpi-trades').textContent = trades.length;
  document.getElementById('kpi-wr').textContent = wr.toFixed(1) + '%';
  document.getElementById('kpi-wr').className = 'kpi-val ' + (wr >= 50 ? 'pos' : 'neg');
  document.getElementById('kpi-pf').textContent = pf.toFixed(2);
  document.getElementById('kpi-avg').textContent = avg.toFixed(2) + ' USDT';

  if (trades.length === 0) return;

  // Gráfico de Serie Temporal (Equidad, DD, Trades Simultáneos)
  chartInstances['equityChart'] = new Chart(document.getElementById('equityChart'), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: 'Cumulative PnL (USDT)',
          data: equityData,
          borderColor: '#2dc653',
          backgroundColor: '#2dc65320',
          fill: true,
          tension: 0.1,
          yAxisID: 'y'
        },
        {
          label: 'Drawdown',
          data: ddData,
          type: 'bar',
          backgroundColor: '#e6394680',
          yAxisID: 'y1'
        },
        {
          label: 'Trades Abiertos',
          data: openTradesData,
          type: 'line',
          borderColor: '#f4a261',
          backgroundColor: 'transparent',
          borderWidth: 1.5,
          tension: 0.2,
          yAxisID: 'y2',
          pointRadius: 0
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        title: { display: false },
        legend: { display: false } // Oculto intencionalmente para usar los custom toggles
      },
      scales: {
        y:  { position: 'left',  grid: {color: '#232740'}, title: {display:true, text:'PnL (USDT)', color:'#6b7294'} },
        y1: { position: 'right', max: 0, grid: {display: false}, title: {display:true, text:'DD (USDT)', color:'#6b7294'} },
        y2: { position: 'right', min: 0, grid: {display: false}, title: {display:true, text:'Concurrencia (Trades)', color:'#f4a261'} }
      }
    }
  });

  // Generador genérico de gráficos de barras
  const createBarChart = (ctxId, title, dataObj) => {
    let keys = Object.keys(dataObj);
    // Preservar orden lógico forzado para Momentum
    if (ctxId === 'momentumChart') {
      keys = ['0-2%', '2-3%', '3-4%', '4-5%', '5-10%', '10-15%', '>15%'];
    }

    const vals = keys.map(k => dataObj[k]);
    const bgColors = vals.map(v => v >= 0 ? '#2dc65380' : '#e6394680');
    const borderColors = vals.map(v => v >= 0 ? '#2dc653' : '#e63946');

    chartInstances[ctxId] = new Chart(document.getElementById(ctxId), {
      type: 'bar',
      data: {
        labels: keys,
        datasets: [{ label: 'PnL USDT', data: vals, backgroundColor: bgColors, borderColor: borderColors, borderWidth: 1 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { title: { display: true, text: title, color: '#e0e3f0' }, legend: {display: false} },
        scales: { y: { grid: {color: '#232740'} } }
      }
    });
  };

  // Instanciación de gráficos estáticos
  createBarChart('quintileChart', 'Rendimiento por Quintil', byQuintile);
  createBarChart('momentumChart', 'Rendimiento por Rango de Momentum (1h)', byMomentum);

  // Ordenar pares y categorías por mayor beneficio para lectura cómoda
  const sortObj = (obj) => {
    return Object.entries(obj).sort((a,b) => b[1] - a[1]).reduce((res, [k,v]) => { res[k] = v; return res; }, {});
  };

  createBarChart('categoryChart', 'Rendimiento Neto por Categoría', sortObj(byCategory));
  createBarChart('pairChart', 'Rendimiento Neto por Activo', sortObj(byPair));
}

init();
</script>
</body>
</html>
